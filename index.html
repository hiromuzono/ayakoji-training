*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#0a0a0f;color:#e8e8f0;max-width:430px;margin:0 auto;min-height:100vh;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
input,textarea,select{outline:none;font-family:inherit}
::-webkit-scrollbar{display:none}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
@keyframes pulseCheck{0%{transform:scale(1)}40%{transform:scale(1.35)}100%{transform:scale(1)}}
.pulse{animation:pulseCheck .25s ease-out}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fadeUp{animation:fadeUp .2s ease-out}
@keyframes shimmer{0%{opacity:.7}50%{opacity:1}100%{opacity:.7}}
.shimmer{animation:shimmer 2s infinite}
@keyframes bd{0%,100%{transform:translateY(0)}50%{transform:translateY(10px)}}

@keyframes br{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}
@keyframes jp{0%,100%{transform:translateY(0)}45%,55%{transform:translateY(-15px)}}

const fmt=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const parseDate=(s)=>new Date(s+'T00:00:00');
const today=()=>fmt(new Date());
const addDays=(s,n)=>{const d=parseDate(s);d.setDate(d.getDate()+n);return fmt(d)};
const dowOf=(s)=>parseDate(s).getDay();
const monthStart=(y,m)=>fmt(new Date(y,m,1));
const daysInMonth=(y,m)=>new Date(y,m+1,0).getDate();

// ── PLAN & LOG UTILS ──────────────────────────────
const getSettings=()=>{const d=store.get('app_settings')||{};return {currentPhase:1,startDate:today(),phaseWeeks:[4,4,4],autoPhase:true,...d};};
const saveSettings=(s)=>store.set('app_settings',s);
const getPhaseRange=(s,p)=>{
  const weeks=s.phaseWeeks||[4,4,4];
  let offset=0;for(let i=0;i<p-1;i++)offset+=weeks[i];
  const start=addDays(s.startDate,offset*7);
  const end=addDays(start,(weeks[p-1]||4)*7-1);
  return {start,end};
};
const detectCurrentPhase=(s)=>{
  const t=today();
  for(let p=1;p<=3;p++){const r=getPhaseRange(s,p);if(t>=r.start&&t<=r.end)return p;}
  const end3=getPhaseRange(s,3).end;return t>end3?3:1;
};
const getCustomPlans=()=>store.get('custom_plans')||[];
const saveCustomPlans=(p)=>store.set('custom_plans',p);

const getPlanForDay=(phase,dow)=>{
  const cp=getCustomPlans();
  const custom=cp.find(p=>p.phase===phase&&p.dayOfWeek===dow);
  if(custom)return custom.exercises.length>0?custom.exercises:null;
  return DEFAULT_PLAN[phase][dow]||null;
};

const getLog=(date)=>store.get(`day_log_${date}`)||{date,sets:[]};
const saveLog=(date,sets)=>store.set(`day_log_${date}`,{date,sets});

const isSetDone=(log,exId,si)=>log.sets.some(s=>s.exerciseId===exId&&s.setIndex===si);
const getSetRec=(log,exId,si)=>log.sets.find(s=>s.exerciseId===exId&&s.setIndex===si)||null;

const countDoneSets=(log,plan)=>{
  if(!plan)return 0;
  let n=0;
  for(const ex of plan){
    for(let i=0;i<ex.sets;i++){
      if(isSetDone(log,ex.exerciseId,i))n++;
    }
  }
  return n;
};

const totalPlanSets=(plan)=>plan?plan.reduce((s,e)=>s+e.sets,0):0;

// ── STATS ─────────────────────────────────────────
const calcWeekStats=(settings)=>{
  const t=today();
  const dow=dowOf(t);
  const weekStart=addDays(t,-(dow===0?6:dow-1));
  let total=0,done=0;
  for(let i=0;i<7;i++){
    const d=addDays(weekStart,i);
    const plan=getPlanForDay(settings.currentPhase,dowOf(d));
    if(!plan)continue;
    total+=totalPlanSets(plan);
    done+=countDoneSets(getLog(d),plan);
  }
  return{total,done,rate:total>0?Math.min(100,Math.round(done/total*100)):0};
};

const calcStreak=(settings)=>{
  const t=today();
  let streak=0;
  for(let i=0;i<365;i++){
    const d=addDays(t,-i);
    const dow=dowOf(d);
    const plan=getPlanForDay(settings.currentPhase,dow);
    if(!plan||plan.length===0)continue;
    const log=getLog(d);
    if(log.sets.length>0){streak++;}
    else if(i===0){continue;}
    else{break;}
  }
  return streak;
};

const calcMonthStats=(settings,year,month)=>{
  const days=daysInMonth(year,month);
  const trainDays=[];
  for(let d=1;d<=days;d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const plan=getPlanForDay(settings.currentPhase,dowOf(ds));
    if(!plan)continue;
    const log=getLog(ds);
    if(log.sets.length>0)trainDays.push(ds);
  }
  return trainDays;
};

const calcTotalSets=()=>{
  let total=0;
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith('day_log_')){
      const v=store.get(k);
      if(v&&v.sets)total+=v.sets.length;
    }
  }
  return total;
};

        <div style={{display:'flex',gap:6,marginBottom:6}}>
          {[1,2,3].map(p=>(
            <button key={p} onClick={()=>setCurrentPhase(p)} style={{flex:1,padding:'8px 0',borderRadius:8,border:`1px solid ${phase===p?C.accent:C.dark}`,background:phase===p?C.accent+'22':C.card,color:phase===p?C.accent:C.muted,fontWeight:phase===p?700:400,fontSize:13,cursor:'pointer',fontFamily:'inherit',transition:'all .2s'}}>
              Phase {p}
            </button>
          ))}
        </div>
        <div style={{textAlign:'center',fontSize:11,color:C.muted,marginBottom:2}}>
          {fmtShort(phaseRange.start)} 〜 {fmtShort(phaseRange.end)}（{settings.phaseWeeks?.[phase-1]||4}週間）
        </div>
      </div>
      {showPhaseSetting&&<PhaseSettingsModal settings={settings} onSave={savePhaseSettings} onClose={()=>setShowPhaseSetting(false)}/>}

      <div style={{padding:'8px 16px',display:'flex',flexDirection:'column',gap:8}}>
        {[1,2,3,4,5,6,0].map(dow=>{
          const plan=getPlanForDay(phase,dow);
          const dt=DAY_TYPE[dow];
          const isTodays=dowOf(t)===dow;
          return(
            <div key={dow} style={{background:C.card,borderRadius:12,padding:'12px 14px',border:`1px solid ${isTodays?C.accent:C.dark}`,transition:'border-color .2s'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:plan?8:0}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  {isTodays&&<div style={{width:6,height:6,borderRadius:3,background:C.accent,flexShrink:0}}/>}
                  <span style={{fontWeight:700,fontSize:15}}>{DAY_NAMES[dow]}曜日</span>
                  <span style={{background:TYPE_COLORS[dt]+'22',color:TYPE_COLORS[dt],fontSize:10,padding:'2px 8px',borderRadius:20,border:`1px solid ${TYPE_COLORS[dt]}44`}}>{TYPE_LABELS[dt]||'休息日'}</span>
                </div>
                {plan&&<button onClick={()=>setEditDay({dow,phase,plan:[...plan]})} style={{background:C.dark,border:'none',color:C.muted,fontSize:11,padding:'4px 10px',borderRadius:6,cursor:'pointer',fontFamily:'inherit'}}>編集</button>}
              </div>
              {plan&&(
                <div style={{display:'flex',flexDirection:'column',gap:3}}>
                  {plan.map(pe=>{
                    const ex=exMap[pe.exerciseId];
                    return ex?(
                      <div key={pe.exerciseId} style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:12,color:C.muted,padding:'2px 0'}}>
                        <span style={{display:'flex',alignItems:'center',gap:2}}>{ex.name}<SearchLink name={ex.name}/></span>
                        <span style={{flexShrink:0}}>{pe.sets}×{pe.reps>0?pe.reps:'MAX'}{unitLabel(pe.unit)}</span>
                      </div>
                    ):null;
                  })}
                </div>
              )}
              {!plan&&<p style={{color:C.muted,fontSize:12}}>回復も鍛錬のうち</p>}
            </div>
          );
        })}
      </div>

      {editDay&&<EditDayModal editDay={editDay} onClose={()=>setEditDay(null)}/>}
    </div>
  );
};

// ── EDIT DAY MODAL ────────────────────────────────
const EditDayModal=({editDay,onClose})=>{
  const [plan,setPlan]=useState(editDay.plan.map(p=>({...p})));
  const [showAdd,setShowAdd]=useState(false);

  const save=()=>{
    const cp=getCustomPlans().filter(p=>!(p.phase===editDay.phase&&p.dayOfWeek===editDay.dow));
    cp.push({phase:editDay.phase,dayOfWeek:editDay.dow,exercises:plan});
    saveCustomPlans(cp);
    onClose();
    window.location.reload();
  };

  const reset=()=>{
    const cp=getCustomPlans().filter(p=>!(p.phase===editDay.phase&&p.dayOfWeek===editDay.dow));
    saveCustomPlans(cp);
    onClose();
    window.location.reload();
  };

  const remove=(idx)=>setPlan(p=>p.filter((_,i)=>i!==idx));
  const move=(idx,dir)=>{
    const np=[...plan];
    const ni=idx+dir;
    if(ni<0||ni>=np.length)return;
    [np[idx],np[ni]]=[np[ni],np[idx]];
    setPlan(np);
  };
  const addEx=(ex)=>{
    setPlan(p=>[...p,{exerciseId:ex.id,sets:3,reps:10,unit:'reps'}]);
    setShowAdd(false);
  };

  return(
    <Modal open={true} onClose={onClose} title={`${DAY_NAMES[editDay.dow]}曜日 編集（Phase ${editDay.phase}）`}>
      <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
        {plan.map((pe,idx)=>{
          const ex=exMap[pe.exerciseId];
          return ex?(
            <div key={idx} style={{background:C.bg,borderRadius:10,padding:'10px 12px',display:'flex',alignItems:'center',gap:8}}>
              <div style={{flex:1}}>
                <p style={{fontSize:13,fontWeight:600}}>{ex.name}</p>
                <div style={{display:'flex',gap:8,marginTop:6,alignItems:'center'}}>
                  <input type="number" value={pe.sets} min="1" max="10"
                    onChange={e=>setPlan(p=>p.map((x,i)=>i===idx?{...x,sets:parseInt(e.target.value)||1}:x))}
                    style={{width:40,background:C.dark,border:'none',borderRadius:4,color:C.text,padding:'3px 6px',fontSize:12,textAlign:'center'}}/>
                  <span style={{color:C.muted,fontSize:11}}>セット×</span>
                  <input type="number" value={pe.reps} min="0"
                    onChange={e=>setPlan(p=>p.map((x,i)=>i===idx?{...x,reps:parseInt(e.target.value)||0}:x))}
                    style={{width:44,background:C.dark,border:'none',borderRadius:4,color:C.text,padding:'3px 6px',fontSize:12,textAlign:'center'}}/>
                  <select value={pe.unit} onChange={e=>setPlan(p=>p.map((x,i)=>i===idx?{...x,unit:e.target.value}:x))}
                    style={{background:C.dark,border:'none',borderRadius:4,color:C.muted,padding:'3px 6px',fontSize:11}}>
                    <option value="reps">回</option>
                    <option value="seconds">秒</option>
                    <option value="minutes">分</option>
                  </select>
                </div>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:4}}>
                <button onClick={()=>move(idx,-1)} style={{background:C.dark,border:'none',color:C.muted,borderRadius:4,width:26,height:22,cursor:'pointer',fontSize:12}}>↑</button>
                <button onClick={()=>move(idx,1)} style={{background:C.dark,border:'none',color:C.muted,borderRadius:4,width:26,height:22,cursor:'pointer',fontSize:12}}>↓</button>
              </div>
              <button onClick={()=>remove(idx)} style={{background:'none',border:'none',color:C.danger,fontSize:18,cursor:'pointer',padding:'4px'}}>×</button>
            </div>
          ):null;
        })}
      </div>

      <button onClick={()=>setShowAdd(v=>!v)} style={{width:'100%',padding:'10px',background:C.accent+'22',border:`1px dashed ${C.accent}`,borderRadius:8,color:C.accent,cursor:'pointer',fontSize:13,fontFamily:'inherit',marginBottom:16}}>
        ＋ 種目を追加
      </button>

      {showAdd&&(
        <div style={{background:C.bg,borderRadius:10,padding:10,marginBottom:16,maxHeight:200,overflowY:'auto'}}>
          {EXERCISES.map(ex=>(
            <button key={ex.id} onClick={()=>addEx(ex)} style={{display:'block',width:'100%',textAlign:'left',background:'none',border:`1px solid ${C.dark}`,borderRadius:6,padding:'8px 10px',cursor:'pointer',fontSize:12,color:C.text,marginBottom:4,fontFamily:'inherit'}}>
              {ex.name} <span style={{color:C.muted}}>— {ex.muscles[0]}</span>
            </button>
          ))}
        </div>
      )}

      <div style={{display:'flex',gap:8}}>
        <button onClick={reset} style={{flex:1,padding:'11px',background:'none',border:`1px solid ${C.dark}`,borderRadius:8,color:C.muted,cursor:'pointer',fontSize:13,fontFamily:'inherit'}}>デフォルトに戻す</button>
        <button onClick={save} style={{flex:2,padding:'11px',background:C.accent,border:'none',borderRadius:8,color:'#fff',cursor:'pointer',fontSize:13,fontWeight:700,fontFamily:'inherit'}}>保存</button>
      </div>
    </Modal>
  );
};

// ── HISTORY TAB ───────────────────────────────────
const HistoryTab=({settings})=>{
  const now=new Date();
  const [year,setYear]=useState(now.getFullYear());
  const [month,setMonth]=useState(now.getMonth());
  const [selDate,setSelDate]=useState(null);

  const trainDays=useMemo(()=>calcMonthStats(settings,year,month),[settings,year,month]);
  const trainSet=new Set(trainDays);

  const firstDow=parseDate(`${year}-${String(month+1).padStart(2,'0')}-01`).getDay();
  const days=daysInMonth(year,month);

  const totalSets=useMemo(()=>calcTotalSets(),[]);
  const weekStats=useMemo(()=>calcWeekStats(settings),[settings]);
  const streak=useMemo(()=>calcStreak(settings),[settings]);
  const monthCount=trainDays.length;

  const prevMonth=()=>{if(month===0){setYear(y=>y-1);setMonth(11)}else setMonth(m=>m-1)};
  const nextMonth=()=>{if(month===11){setYear(y=>y+1);setMonth(0)}else setMonth(m=>m+1)};

  // Weekly bar chart: last 4 weeks
  const weekBars=useMemo(()=>{
    const t=today();
    return Array.from({length:4},(_,i)=>{
      const wEnd=addDays(t,-i*7);
      const wStart=addDays(wEnd,-6);
      let sets=0;
      for(let d=0;d<7;d++){
        const ds=addDays(wStart,d);
        const l=getLog(ds);
        sets+=l.sets.length;
      }
      return{label:`-${i>0?i+'週':'今週'}`,sets};
    }).reverse();
  },[]);
  const maxBar=Math.max(...weekBars.map(w=>w.sets),1);

  const selLog=selDate?getLog(selDate):null;
  const selPlan=selDate?getPlanForDay(settings.currentPhase,dowOf(selDate)):null;

  return(
    <div style={{paddingBottom:80}}>
      <div style={{padding:'16px 16px 0'}}>
        <h1 style={{fontSize:20,fontWeight:700,marginBottom:16,letterSpacing:1}}>履歴・統計</h1>

        {/* Calendar */}
        <div style={{background:C.card,borderRadius:12,padding:'14px',marginBottom:12}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <button onClick={prevMonth} style={{background:C.dark,border:'none',color:C.text,width:30,height:30,borderRadius:6,cursor:'pointer',fontSize:16}}>‹</button>
            <span style={{fontWeight:700,fontSize:15}}>{year}年 {month+1}月</span>
            <button onClick={nextMonth} style={{background:C.dark,border:'none',color:C.text,width:30,height:30,borderRadius:6,cursor:'pointer',fontSize:16}}>›</button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}}>
            {DAY_NAMES.map(d=><div key={d} style={{textAlign:'center',fontSize:10,color:C.muted,padding:'2px 0'}}>{d}</div>)}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
            {Array.from({length:firstDow}).map((_,i)=><div key={`e${i}`}/>)}
            {Array.from({length:days},(_,i)=>{
              const d=i+1;
              const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
              const hasTrain=trainSet.has(ds);
              const isTd=ds===today();
              const isSel=ds===selDate;
              return(
                <button key={d} onClick={()=>setSelDate(isSel?null:ds)}
                  style={{aspectRatio:'1',borderRadius:6,background:isSel?C.accent:isTd?C.accent+'33':hasTrain?C.success+'22':C.dark,border:`1px solid ${isSel?C.accent:isTd?C.accent+'66':C.dark}`,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:1}}>
                  <span style={{fontSize:11,color:isSel?'#fff':isTd?C.accent:C.text}}>{d}</span>
                  {hasTrain&&<div style={{width:4,height:4,borderRadius:2,background:isSel?'#fff':C.success}}/>}
                </button>
              );
            })}
          </div>
        </div>

        {/* Selected Day Detail */}
        {selDate&&selLog&&(
          <div className="fadeUp" style={{background:C.card,borderRadius:12,padding:'12px 14px',marginBottom:12,border:`1px solid ${C.accent}44`}}>
            <p style={{fontWeight:700,fontSize:13,marginBottom:8,color:C.accent}}>
              {parseDate(selDate).getMonth()+1}/{parseDate(selDate).getDate()} の記録
            </p>
            {selLog.sets.length===0?(
              <p style={{color:C.muted,fontSize:12}}>記録なし</p>
            ):(
              <div style={{display:'flex',flexDirection:'column',gap:4}}>
                {selPlan&&selPlan.map(pe=>{
                  const ex=exMap[pe.exerciseId];
                  const doneSets=Array.from({length:pe.sets},(_,i)=>isSetDone(selLog,pe.exerciseId,i)).filter(Boolean).length;
                  if(doneSets===0)return null;
                  return ex?(
                    <div key={pe.exerciseId} style={{display:'flex',justifyContent:'space-between',fontSize:12}}>
                      <span style={{color:C.text}}>{ex.name}</span>
                      <span style={{color:C.success}}>{doneSets}/{pe.sets} セット</span>
                    </div>
                  ):null;
                })}
                <p style={{color:C.muted,fontSize:11,marginTop:4}}>合計 {selLog.sets.length} セット記録</p>
              </div>
            )}
          </div>
        )}

        {/* Stats Cards */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
          {[
            {label:'今週の達成率',value:`${weekStats.rate}%`,color:C.accent},
            {label:'今月のトレーニング',value:`${monthCount}日`,color:C.success},
            {label:'連続記録',value:`${streak}日 🔥`,color:C.warn},
            {label:'累計セット数',value:`${totalSets}`,color:C.muted},
          ].map(s=>(
            <div key={s.label} style={{background:C.card,borderRadius:12,padding:'12px 14px',border:`1px solid ${C.dark}`}}>
              <p style={{color:C.muted,fontSize:10,letterSpacing:1,marginBottom:4}}>{s.label}</p>
              <p style={{fontSize:20,fontWeight:700,color:s.color}}>{s.value}</p>
            </div>
          ))}
        </div>

        {/* Weekly Bar Chart */}
        <div style={{background:C.card,borderRadius:12,padding:'14px',marginBottom:12}}>
          <p style={{color:C.muted,fontSize:11,letterSpacing:2,marginBottom:14}}>過去4週のセット数</p>
          <div style={{display:'flex',gap:8,alignItems:'flex-end',height:80}}>
            {weekBars.map((w,i)=>(
              <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                <span style={{color:C.accent,fontSize:10}}>{w.sets}</span>
                <div style={{width:'100%',background:C.dark,borderRadius:4,overflow:'hidden',height:60,display:'flex',alignItems:'flex-end'}}>
                  <div style={{width:'100%',background:`linear-gradient(180deg,${C.accent},${C.accent}88)`,height:`${(w.sets/maxBar)*100}%`,borderRadius:4,transition:'height .5s'}}/>
                </div>
                <span style={{color:C.muted,fontSize:9,textAlign:'center'}}>{w.label}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

// ── APP ROOT ──────────────────────────────────────
const App=()=>{
  const [tab,setTab]=useState('today');
  const [settings,setSettings]=useState(()=>getSettings());
  const [viewDate,setViewDate]=useState(()=>today());

  return(
    <div style={{background:C.bg,minHeight:'100vh',color:C.text}}>
      {tab==='today'&&<TodayTab settings={settings} viewDate={viewDate} setViewDate={setViewDate}/>}
      {tab==='schedule'&&<ScheduleTab settings={settings} setSettings={setSettings}/>}
      {tab==='history'&&<HistoryTab settings={settings}/>}
      <BottomNav tab={tab} setTab={setTab}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
